{{ define "main" }}

<section class="relative border border-gray-200/20 bg-[#070709] rounded-2xl p-8 md:p-12 text-gray-300">
  <div class="flex flex-col md:flex-row-reverse items-center md:items-start gap-10 md:gap-12">

    <div class="shrink-0">
      <img
        src="/images/profile.jpg"
        alt="Your profile photo"
        class="w-40 h-40 md:w-56 md:h-56 rounded-full object-cover object-center border-2 border-cyan-300/40 shadow-lg"
      />
    </div>

    <div class="flex-1 max-w-3xl text-center md:text-left">
      <h1 class="text-3xl sm:text-4xl md:text-5xl font-semibold text-cyan-300 mb-6 tracking-wide">
        About Me
      </h1>

      <div class="space-y-6 text-base sm:text-lg md:text-xl leading-relaxed
                  [&_a]:text-blue-200
                  [&_a]:underline
                  [&_a:hover]:text-blue-100
                  [&_a]:transition-colors
                  [&_a]:duration-200">

        {{ with site.GetPage "page" "about.md" }}
          {{ .Content }}
        {{ end }}

      </div>
    </div>

  </div>
</section>

{{ end }}
